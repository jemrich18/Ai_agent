<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunting AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #e8e8e8; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 700px; height: 90vh; display: flex; flex-direction: column; padding: 1rem; }
    h1 { text-align: center; margin-bottom: 1rem; color: #c8a96e; font-size: 1.4rem; letter-spacing: 1px; }
    .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 1rem; background: #111; border-radius: 8px; margin-bottom: 1rem; }
    .message { padding: 10px 14px; border-radius: 8px; max-width: 80%; line-height: 1.5; font-size: 14px; }
    .user { background: #2a3a2a; align-self: flex-end; color: #c8e6c9; }
    .assistant { background: #2a2a2a; align-self: flex-start; color: #e8e8e8; border-left: 3px solid #c8a96e; }
    .input-row { display: flex; gap: 8px; }
    input { flex: 1; padding: 12px 16px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #e8e8e8; font-size: 14px; outline: none; }
    input:focus { border-color: #c8a96e; }
    button { padding: 12px 20px; background: #c8a96e; color: #1a1a1a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
    button:hover { background: #d4b87a; }
    button:disabled { background: #555; cursor: not-allowed; }
    .typing { color: #888; font-style: italic; font-size: 13px; align-self: flex-start; padding: 6px 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🦌 Hunting AI Assistant</h1>
    <div class="messages" id="messages">
      <div class="message assistant">Ask me anything about hunting — gear setup, where to hunt, weather conditions, regulations, or bow tuning.</div>
    </div>
    <div class="input-row">
      <input type="text" id="input" placeholder="e.g. What states have OTC elk tags?" onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button id="btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script>
    const sessionId = 'user_' + Math.random().toString(36).substr(2, 9);

    function addMessage(text, cssClass, id) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message ' + cssClass;
      if (id) div.id = id;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');
      const btn = document.getElementById('btn');
      const text = input.value.trim();
      if (!text) return;
      if (text.length > 2000) {
        addMessage('Message is too long (max 2000 characters).', 'assistant');
        return;
      }
      input.value = '';
      btn.disabled = true;
      addMessage(text, 'user');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing';
      typingDiv.id = 'typing';
      typingDiv.textContent = 'Thinking...';
      messages.appendChild(typingDiv);
      messages.scrollTop = messages.scrollHeight;
      try {
        const res = await fetch('/api/chat/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId })
        });
        const data = await res.json();
        document.getElementById('typing').remove();
        if (res.ok) {
          addMessage(data.message, 'assistant');
        } else {
          addMessage(data.error || 'Something went wrong. Please try again.', 'assistant');
        }
      } catch (e) {
        document.getElementById('typing')?.remove();
        addMessage('Something went wrong. Please check your connection and try again.', 'assistant');
      }
      btn.disabled = false;
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
